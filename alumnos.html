<!DOCTYPE html>

</head>
<body class="bg-body-tertiary">

    <div class="d-flex flex-column flex-md-row vh-100 overflow-hidden">

                <span class="navbar-toggler-icon"></span>
            </button>
        </nav>

        <aside class="offcanvas-md offcanvas-start bg-body border-end shadow-sm flex-shrink-0" tabindex="-1" id="sidebarOffcanvas" style="width: 280px;">
            <div class="offcanvas-header border-bottom d-md-none">
                <h5 class="offcanvas-title fw-bold">Menú Principal</h5>
                <button type="button" class="btn-close" data-bs-dismiss="offcanvas" data-bs-target="#sidebarOffcanvas"></button>
            </div>
            <div class="offcanvas-body d-flex flex-column p-3 h-100 overflow-y-auto">
                <div class="text-center mb-4 mt-3 d-none d-md-block">
                    <img src="img/Gemini_Generated_Image_l6aynpl6aynpl6ay.png" alt="Ballet" width="150" class="img-fluid rounded">

                <ul class="nav nav-pills flex-column mb-auto gap-2 w-100">

        <main class="flex-grow-1 p-4 p-md-5 overflow-y-auto">
            <header class="mb-4 mb-md-5">
                <h2 class="fw-bold">Buscador de Alumnos</h2>
                <p class="text-muted">Ingresa el Carnet de Identidad (CI) o el nombre completo para ver el kardex.</p>
            </header>

            <div class="row mb-5">
                <div class="col-md-8 col-lg-6">
                    <div class="input-group input-group-lg shadow-sm">
                        <span class="input-group-text bg-body-secondary border-0"><i class="fas fa-search"></i></span>
                        <input type="text" class="form-control border-0 bg-body-secondary" placeholder="Ej: 8475938 LP o 'Juan Pérez'">
                        <button class="btn btn-primary px-3 px-md-4" type="button">Buscar</button>
                    </div>
                </div>
            </div>

            <div class="row row-cols-1 row-cols-md-2 row-cols-xl-3 g-4">
                <div class="col">
                    <a href="perfil_alumno.html" class="card h-100 text-decoration-none shadow-sm border-secondary-subtle card-hover transition">
                        <div class="card-body">
                            <div class="d-flex align-items-center mb-3">
                                <div class="bg-primary-subtle text-primary rounded-circle d-flex align-items-center justify-content-center fw-bold fs-4 me-3 flex-shrink-0" style="width: 56px; height: 56px;">

                            <div class="btn btn-outline-primary w-100">Ver Kardex Completo</div>
                        </div>

                </div>
