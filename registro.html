<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolivia Arte y Tradicion, Ballet Cultural</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"/>
</head>
<body class="bg-body-tertiary">

    <div class="d-flex flex-column flex-md-row vh-100 overflow-hidden">
        
        <nav class="d-md-none navbar navbar-dark bg-body border-bottom px-3 flex-shrink-0 shadow-sm">
            <a class="navbar-brand m-0" href="index.html">
                <img src="img/Gemini_Generated_Image_l6aynpl6aynpl6ay.png" alt="Ballet" height="40" style="object-fit: cover; border-radius: 4px;">
            </a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebarOffcanvas">
                <span class="navbar-toggler-icon"></span>
            </button>
        </nav>

        <aside class="offcanvas-md offcanvas-start bg-body border-end shadow-sm flex-shrink-0" tabindex="-1" id="sidebarOffcanvas" style="width: 280px;">
            <div class="offcanvas-header border-bottom d-md-none">
                <h5 class="offcanvas-title fw-bold">Menú Principal</h5>
                <button type="button" class="btn-close" data-bs-dismiss="offcanvas" data-bs-target="#sidebarOffcanvas"></button>
            </div>
            <div class="offcanvas-body d-flex flex-column p-3 h-100 overflow-y-auto">
                <div class="text-center mb-4 mt-3 d-none d-md-block">
                    <img src="img/Gemini_Generated_Image_l6aynpl6aynpl6ay.png" alt="Ballet" width="150" class="img-fluid rounded">
                </div>
                <ul class="nav nav-pills flex-column mb-auto gap-2 w-100">
                    <li><a href="index.html" class="nav-link link-body-emphasis"><i class="fas fa-home fa-fw me-2"></i> Inicio</a></li>
                    <li><a href="alumnos.html" class="nav-link link-body-emphasis"><i class="fas fa-users fa-fw me-2"></i> Alumnos</a></li>
                    <li><a href="registro.html" class="nav-link active"><i class="fas fa-user-plus fa-fw me-2"></i> Nuevo Ingreso</a></li>
                </ul>
            </div>
        </aside>

        <main class="flex-grow-1 p-4 p-md-5 overflow-y-auto">
            <header class="mb-4 mb-md-5">
                <h2 class="fw-bold">Inscripción de Nuevo Alumno</h2>
                <p class="text-muted">Completa el formulario para abrir el kardex.</p>
            </header>

            <div class="card shadow-sm border-secondary-subtle mx-auto" style="max-width: 900px;">
                <div class="card-body p-3 p-md-5">
                    <form class="row g-3 g-md-4" action="#" method="POST">
                        
                        <div class="col-12">
                            <h5 class="fw-bold text-primary border-bottom border-secondary-subtle pb-2 mb-2 mt-2">
                                <i class="fas fa-id-card me-2"></i> Datos Personales
                            </h5>
                        </div>
                        <div class="col-12 col-md-6">
                            <label class="form-label fw-medium text-muted small">Nombres</label>
                            <input type="text" class="form-control form-control-lg bg-body-secondary border-0" placeholder="Ej: Juan Carlos" required>
                        </div>
                        <div class="col-12 col-md-6">
                            <label class="form-label fw-medium text-muted small">Apellidos</label>
                            <input type="text" class="form-control form-control-lg bg-body-secondary border-0" placeholder="Ej: Mamani Quispe" required>
                        </div>
                        
                        <div class="col-12 col-md-6">
                            <label class="form-label fw-medium text-muted small">CI / Extensión</label>
                            <div class="input-group input-group-lg">
                                <input type="text" class="form-control bg-body-secondary border-0" placeholder="Número CI" required>
                                <select class="form-select bg-body-secondary border-0" style="max-width: 90px; padding-left: 8px;">
                                    <option>LP</option><option>OR</option><option>CB</option>
                                    <option>PT</option><option>CH</option><option>TJ</option>
                                    <option>SC</option><option>BE</option><option>PD</option>
                                </select>
                            </div>
                        </div>
                        <div class="col-12 col-md-6">
                            <label class="form-label fw-medium text-muted small">Nacimiento</label>
                            <input type="date" class="form-control form-control-lg bg-body-secondary border-0" required>
                        </div>

                        <div class="col-12 mt-4 mt-md-5">
                            <h5 class="fw-bold text-primary border-bottom border-secondary-subtle pb-2 mb-2">
                                <i class="fas fa-phone-alt me-2"></i> Contacto
                            </h5>
                        </div>
                        <div class="col-12 col-md-6">
                            <label class="form-label fw-medium text-muted small">Celular</label>
                            <div class="input-group input-group-lg">
                                <span class="input-group-text border-0 text-muted">+591</span>
                                <input type="text" class="form-control bg-body-secondary border-0" placeholder="71234567" required>
                            </div>
                        </div>
                        <div class="col-12 col-md-6">
                            <label class="form-label fw-medium text-muted small">Dirección</label>
                            <input type="text" class="form-control form-control-lg bg-body-secondary border-0" placeholder="Ej: Zona Sur" required>
                        </div>

                        <div class="col-12 mt-4 mt-md-5">
                            <h5 class="fw-bold text-primary border-bottom border-secondary-subtle pb-2 mb-2">
                                <i class="fas fa-shoe-prints me-2"></i> Curso
                            </h5>
                        </div>
                        <div class="col-12 col-md-6">
                            <label class="form-label fw-medium text-muted small">Fecha de Ingreso</label>
                            <input type="date" id="fechaActual" class="form-control form-control-lg bg-body-secondary border-0" required>
                        </div>
                        <div class="col-12 col-md-6">
                            <label class="form-label fw-medium text-muted small">Nivel Inicial</label>
                            <select class="form-select form-select-lg bg-body-secondary border-0" required>
                                <option disabled selected value="">Selecciona danza...</option>
                                <option>Elenco Infantil</option>
                                <option>Elenco Pre-Juvenil</option>
                                <option>Elenco Juvenil</option>
                            </select>
                        </div>

                        <div class="col-12 mt-4 border-top border-secondary-subtle pt-4 d-flex flex-column flex-sm-row justify-content-end gap-2">
                            <button type="button" onclick="window.location.href='index.html'" class="btn btn-outline-secondary px-4 py-2 order-2 order-sm-1">
                                Cancelar
                            </button>
                            <button type="submit" class="btn btn-primary px-4 py-2 fw-bold shadow-sm order-1 order-sm-2">
                                <i class="fas fa-save me-2"></i> Guardar
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script>
        document.getElementById('fechaActual').valueAsDate = new Date();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
